apiVersion: v1
kind: ConfigMap
metadata:
  name: order-rpc-conf
  namespace: app
data:
  order-rpc.yaml: |
    Name: order-rpc
    Host: 0.0.0.0
    Port: 9889
    Auth:
      AccessSecret: infar-secret-2026
      AccessExpire: 86400
    # 這裡的名稱會在腳本中處理，或是維持通用
    OrderRpc:
      Endpoints:
        - order-rpc-svc.app.svc.cluster.local:9091
    UserRpc:
      Endpoints:
        - user-rpc-svc.app.svc.cluster.local:9090

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-rpc
  namespace: app
  labels:
    app: order-rpc
spec:
  replicas: 3
  selector:
    matchLabels:
      app: order-rpc
  template:
    metadata:
      labels:
        app: order-rpc
      annotations:
        infar.io/config-last-updated: "20260406"
    spec:
      containers:
      - name: order-rpc
        image: babyandy0111/infar-order-rpc:v1
        ports:
        - containerPort: 9889
        volumeMounts:
        - name: config
          mountPath: /app/etc
      volumes:
      - name: config
        configMap:
          name: order-rpc-conf

---
apiVersion: v1
kind: Service
metadata:
  name: order-rpc-svc
  namespace: app
spec:
  ports:
  - port: 9889
    targetPort: 9889
  selector:
    app: order-rpc
