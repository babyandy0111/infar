apiVersion: v1
kind: ConfigMap
metadata:
  name: order-api-conf
  namespace: app
data:
  order-api.yaml: |
    Name: order-api
    Host: 0.0.0.0
    Port: 8889
    Auth:
      AccessSecret: infar-secret-2026
      AccessExpire: 86400
    # 這裡的名稱會在腳本中處理，或是維持通用
    OrderRpc:
      Endpoints:
        - order-rpc-svc.app.svc.cluster.local:9091
    UserRpc:
      Endpoints:
        - user-rpc-svc.app.svc.cluster.local:9090

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-api
  namespace: app
  labels:
    app: order-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: order-api
  template:
    metadata:
      labels:
        app: order-api
      annotations:
        infar.io/config-last-updated: "20260406"
    spec:
      containers:
      - name: order-api
        image: babyandy0111/infar-order-api:v1
        ports:
        - containerPort: 8889
        volumeMounts:
        - name: config
          mountPath: /app/etc
      volumes:
      - name: config
        configMap:
          name: order-api-conf

---
apiVersion: v1
kind: Service
metadata:
  name: order-api-svc
  namespace: app
spec:
  ports:
  - port: 8889
    targetPort: 8889
  selector:
    app: order-api
