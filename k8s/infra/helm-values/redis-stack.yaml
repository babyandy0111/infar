global:
  security:
    allowInsecureImages: true
image:
  repository: redis/redis-stack-server
  tag: latest
architecture: standalone
auth:
  enabled: true
  password: "redispassword"
master:
  persistence:
    size: 2Gi
  resources:
    limits:
      memory: 256Mi
    requests:
      memory: 128Mi
  # 覆蓋 Bitnami 預設的啟動命令，直接使用 redis-stack-server 的原生啟動方式
  # 這樣它就會自動載入所有內建的 modules (如 RediSearch)
  command: ["/entrypoint.sh"]
  args: ["redis-server", "--requirepass", "redispassword"]
  # 關閉 Bitnami 特有的配置生成，避免覆蓋原生行為
  disableCommands: []
