adminPassword: admin
service:
  type: NodePort
persistence:
  enabled: true
  size: 2Gi

ingress:
  enabled: true
  hosts:
    - grafana.local
  ingressClassName: nginx

datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
      - name: Loki
        type: loki
        access: proxy
        url: http://loki-gateway.observability.svc.cluster.local
        isDefault: true
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus-server.observability.svc.cluster.local
      # 對接 Linkerd 的數據中心
      - name: Linkerd-Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus.linkerd-viz.svc.cluster.local:9090

# 最穩定的官方掛載法
dashboardProviders:
  dashboardproviders.yaml:
    apiVersion: 1
    providers:
      - name: 'Linkerd'
        orgId: 1
        folder: ''
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards/linkerd

dashboardsConfigMaps:
  linkerd: "linkerd-grafana-dashboards"
