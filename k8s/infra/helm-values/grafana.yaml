adminPassword: admin
service:
  type: NodePort
persistence:
  enabled: true
  size: 2Gi

# 強制設定 SecurityContext，避免 init-chown-data 權限不足的 Error
securityContext:
  runAsUser: 472
  runAsGroup: 472
  fsGroup: 472

ingress:
  enabled: true
  hosts:
    - grafana.local
  ingressClassName: nginx

datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
      - name: Loki
        type: loki
        access: proxy
        url: http://loki-gateway.observability.svc.cluster.local
        isDefault: true
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus-server.observability.svc.cluster.local
      - name: Linkerd-Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus.linkerd-viz.svc.cluster.local:9090

# 核心修正：告訴 Grafana 只讀取 Infar 專屬的資料夾
dashboardProviders:
  dashboardproviders.yaml:
    apiVersion: 1
    providers:
      - name: 'Infar'
        orgId: 1
        folder: 'Infar Custom'
        type: file
        options:
          path: /var/lib/grafana/dashboards/infar

dashboardsConfigMaps:
  infar: "infar-grafana-dashboard"
