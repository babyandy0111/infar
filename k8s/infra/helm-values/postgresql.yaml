# 移除有問題的 tag 設定，讓 Chart 使用它內建的預設穩定版本 (18.3.0)
image:
  registry: docker.io
  repository: bitnami/postgresql

auth:
  database: "infar_db"
  username: "admin"
  # 移除明文密碼，改用 K8s Secret
  existingSecret: "infra-secrets"
  secretKeys:
    adminPasswordKey: "postgresql-password"
    userPasswordKey: "postgresql-password"

architecture: standalone

primary:
  persistence:
    size: 4Gi
  resources:
    limits:
      memory: 512Mi
    requests:
      memory: 256Mi

# 滿足 Helm Chart 的語法檢查，即使 architecture: standalone 不會用到這塊，
# 依然需要提供資源定義避免 WARNING 產生。
readReplicas:
  resources:
    limits:
      memory: 512Mi
    requests:
      memory: 256Mi

# 關閉不需要的額外 Shell 容器以消除 os-shell:latest 警告
volumePermissions:
  enabled: false
