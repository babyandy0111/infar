image:
  # 固定 PostgreSQL 映像檔版本，避免 :latest 警告
  tag: 16.2.0-debian-12-r12

auth:
  database: "infar_db"
  username: "admin"
  password: "password123"

architecture: standalone

primary:
  persistence:
    size: 4Gi
  resources:
    limits:
      memory: 512Mi
    requests:
      memory: 256Mi

# 滿足 Helm Chart 的語法檢查，即使 architecture: standalone 不會用到這塊，
# 依然需要提供資源定義避免 WARNING 產生。
readReplicas:
  resources:
    limits:
      memory: 512Mi
    requests:
      memory: 256Mi

# 關閉不需要的額外 Shell 容器以消除 os-shell:latest 警告
volumePermissions:
  enabled: false
