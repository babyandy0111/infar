                                description: Name is used to refer to a source and is displayed in the UI. It is used in multi-source Applications.
                                type: string
                              path:
                                description: Path is a directory path within the Git repository, and is only valid for applications sourced from Git.
                                type: string
                              plugin:
                                description: Plugin holds config management plugin specific options
                                properties:
                                  env:
                                    description: Env is a list of environment variable entries
                                    items:
                                      description: EnvEntry represents an entry in the application's environment
                                      properties:
                                        name:
                                          description: Name is the name of the variable, usually expressed in uppercase
                                          type: string
                                        value:
                                          description: Value is the value of the variable
                                          type: string
                                      required:
                                        - name
                                        - value
                                      type: object
                                    type: array
                                  name:
                                    type: string
                                  parameters:
                                    items:
                                      properties:
                                        array:
                                          description: Array is the value of an array type parameter.
                                          items:
                                            type: string
                                          type: array
                                        map:
                                          additionalProperties:
                                            type: string
                                          description: Map is the value of a map type parameter.
                                          type: object
                                        name:
                                          description: Name is the name identifying a parameter.
                                          type: string
                                        string:
                                          description: String_ is the value of a string type parameter.
                                          type: string
                                      type: object
                                    type: array
                                type: object
                              ref:
                                description: Ref is reference to another source within sources field. This field will not be used if used with a `source` tag.
                                type: string
                              repoURL:
                                description: RepoURL is the URL to the repository (Git or Helm) that contains the application manifests
                                type: string
                              targetRevision:
                                description: |-
                                  TargetRevision defines the revision of the source to sync the application to.
                                  In case of Git, this can be commit, tag, or branch. If omitted, will equal to HEAD.
                                  In case of Helm, this is a semver tag for the Chart's version.
                                type: string
                            required:
                              - repoURL
                            type: object
                          type: array
                      required:
                        - destination
                      type: object
                    revision:
                      description: Revision contains information about the revision the comparison has been performed to
                      type: string
                    revisions:
                      description: Revisions contains information about the revisions of multiple sources the comparison has been performed to
                      items:
                        type: string
                      type: array
                    status:
                      description: Status is the sync state of the comparison
                      type: string
                  required:
                    - status
                  type: object
              type: object
          required:
            - metadata
            - spec
          type: object
      served: true
      storage: true
      subresources: {}
