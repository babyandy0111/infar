metadata:
  labels:
    project: infar
  name: kafka
  namespace: infra
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka
  serviceName: kafka
  template:
    metadata:
      labels:
        app: kafka
    spec:
      containers:
        - env:
            - name: KAFKA_BROKER_ID
              value: "1"
            - name: KAFKA_ZOOKEEPER_CONNECT
              value: zookeeper:2181
            - name: KAFKA_LISTENERS
              value: PLAINTEXT://0.0.0.0:9092
            - name: KAFKA_ADVERTISED_LISTENERS
              value: PLAINTEXT://kafka-service.infra.svc.cluster.local:9092
            - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
              value: "1"
          image: wurstmeister/kafka:2.13-2.8.1
          name: kafka
          ports:
            - containerPort: 9092
          volumeMounts:
            - mountPath: /kafka
              name: data
      initContainers:
        - command:
            - sh
            - -c
            - rm -rf /kafka/meta.properties && echo 'Cleaned old metadata' || true
          image: busybox:latest
          name: fix-cluster-id
          volumeMounts:
            - mountPath: /kafka
              name: data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 2Gi
