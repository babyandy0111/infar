---
# -----------------------------------------------------
# 1. ZooKeeper (Kafka 依賴)
# -----------------------------------------------------
apiVersion: v1
kind: Service
metadata:
  name: zookeeper
  namespace: infra
spec:
  ports:
    - name: client
      port: 2181
      targetPort: 2181
  selector:
    app: zookeeper

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zookeeper
  namespace: infra
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zookeeper
  template:
    metadata:
      labels:
        app: zookeeper
      annotations:
        linkerd.io/inject: enabled
    spec:
      containers:
        - name: zookeeper
          # 使用 Docker Hub 官方 ZK，保證存在且穩定
          image: zookeeper:3.8.3
          env:
            - name: ALLOW_ANONYMOUS_LOGIN
              value: "yes"
          ports:
            - containerPort: 2181
          resources:
            requests:
              memory: "128Mi"
            limits:
              memory: "256Mi"

---
# -----------------------------------------------------
# 2. Kafka Broker (單機開發版)
# -----------------------------------------------------
apiVersion: v1
kind: Service
metadata:
  name: kafka-service
  namespace: infra
spec:
  ports:
    - name: broker
      port: 9092
      targetPort: 9092
  selector:
    app: kafka

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: kafka
  namespace: infra
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "4191"
    prometheus.io/path: "/metrics"
spec:
  serviceName: kafka
  replicas: 1
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
      annotations:
        linkerd.io/inject: enabled
    spec:
      containers:
        - name: kafka
          # 使用社群最推崇、最單純的 wurstmeister Kafka 映像檔
          image: wurstmeister/kafka:2.13-2.8.1
          ports:
            - containerPort: 9092
          env:
            - name: KAFKA_BROKER_ID
              value: "1"
            - name: KAFKA_ZOOKEEPER_CONNECT
              value: "zookeeper:2181"
            - name: KAFKA_LISTENERS
              value: "PLAINTEXT://0.0.0.0:9092"
            - name: KAFKA_ADVERTISED_LISTENERS
              value: "PLAINTEXT://kafka.infra.svc.cluster.local:9092"
            - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
              value: "1"
          resources:
            requests:
              memory: "512Mi"
            limits:
              memory: "1Gi"
          volumeMounts:
            - name: data
              mountPath: /kafka
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ "ReadWriteOnce" ]
        resources:
          requests:
            storage: 2Gi
