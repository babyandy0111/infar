server {
    listen 80;

    # 靜態網頁與 SPA 路由
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # 將 /user 開頭的請求轉發給 K8s 內的 user-api 服務
    # 注意：proxy_pass 網址結尾「不要」加斜線，這樣 /user/login 就會原封不動傳過去
    location /user/ {
        proxy_pass http://user-api-svc.app.svc.cluster.local:8888;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # 將 /v1/order 開頭的請求轉發給 K8s 內的 order-api 服務
    location /v1/order/ {
        proxy_pass http://order-api-svc.app.svc.cluster.local:8889;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
