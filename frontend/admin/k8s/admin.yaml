apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin-frontend
  namespace: app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: admin-frontend
  template:
    metadata:
      labels:
        app: admin-frontend
    spec:
      containers:
      - name: admin-frontend
        image: babyandy0111/infar-admin-frontend:v1
        imagePullPolicy: Always
        ports:
        - containerPort: 80

---
apiVersion: v1
kind: Service
metadata:
  name: admin-frontend-svc
  namespace: app
spec:
  ports:
  - port: 80
    targetPort: 80
  selector:
    app: admin-frontend
